<!DOCTYPE html>
<html data-layout="16x9">
<head>
  <style>
    section { padding: 40px; display: flex; flex-direction: column; gap: 20px; background-color: #f0f0f0; }
    h2 { font-size: 24pt; color: #333; }
    .box {
      background-color: white;
      padding: 30px;
      border-radius: 8px;
      width: 200px;
    }
    .shadow {
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <section>
    <h2>Simple Shadow Test</h2>
    <div class="box shadow">
      <p>Box with shadow</p>
    </div>
  </section>
</body>
</html>
